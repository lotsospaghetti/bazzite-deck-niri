---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: bazzite-deck-niri
description: Experimental attempt at making Niri usable on Bazzite's Steam Deck image.

base-image: ghcr.io/ublue-os/bazzite-deck-gnome
image-version: latest
platforms:
  - linux/amd64

modules:
  - type: script
    snippets:
      - "echo 'Enable Terra repo' && sed -i 's@enabled=0@enabled=1@g' /etc/yum.repos.d/terra.repo"
      - "echo 'Remove Gnome DE' && dnf5 -y remove *gnome* *mutter* --exclude=gnome-disk-utility,lutris,gnome-desktop3"
      - "echo 'Set session command to niri-session' && sed -i 's@/usr/bin/gnome-session@/usr/bin/niri-session@g' /usr/bin/gnome-session-oneshot"
  - type: dnf
    install:
      allow-erasing: true
      packages:
        - sddm
        - niri
        - gnome-keyring
        - xwayland-satellite
        - noctalia-shell
        - cliphist
        - wlsunset
        - matugen # TODO: ujust script for CLI (https://iniox.github.io/#matugen/usage)
        - cava
        - gpu-screen-recorder
      exclude:
        - alacritty
        - fuzzel
        - swaylock
        - waybar
        - xdg-desktop-portal-*
  - type: script
    snippets:
      - "echo 'Disable Terra repo' && sed -i 's@enabled=1@enabled=0@g' /etc/yum.repos.d/terra.repo"

  # TODO: will need niri keybinds and fixes for things this install inevitably breaks
  - type: files
    files:
      - source: system
        destination: /

  - type: signing
